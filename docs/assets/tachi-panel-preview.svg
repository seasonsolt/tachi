<svg width="900" height="540" viewBox="0 0 1100 660" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tachi panel preview</title>
  <desc id="desc">A stylized preview of the Tachi macOS menu bar panel with live Claude Code and Codex session cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070B"/>
      <stop offset="1" stop-color="#0B1424"/>
    </linearGradient>
    <linearGradient id="panel" x1="86" y1="72" x2="1014" y2="588" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101928"/>
      <stop offset="1" stop-color="#070A10"/>
    </linearGradient>
    <linearGradient id="blueShell" x1="177" y1="176" x2="405" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#55C8FF"/>
      <stop offset="0.48" stop-color="#0B8EFF"/>
      <stop offset="1" stop-color="#004AAE"/>
    </linearGradient>
    <linearGradient id="accent" x1="456" y1="170" x2="966" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D6FF"/>
      <stop offset="1" stop-color="#7A86FF"/>
