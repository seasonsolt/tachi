<svg width="920" height="360" viewBox="0 0 920 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tachi local data flow</title>
  <desc id="desc">Claude Code and Codex local session traces both flow into Tachi, the menu bar companion. Everything stays on your Mac.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b111a"/>
      <stop offset="1" stop-color="#070a10"/>
    </linearGradient>
    <linearGradient id="tachiFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2033"/>
      <stop offset="1" stop-color="#0b1622"/>
    </linearGradient>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <rect x="6" y="6" width="908" height="348" rx="22" fill="url(#bg)" stroke="#1b2b3d" stroke-width="1"/>

  <!-- source: Claude Code -->
  <g>
    <rect x="46" y="68" width="272" height="92" rx="14" fill="#101a26" stroke="#38bdf8" stroke-opacity="0.22"/>
    <circle cx="74" cy="100" r="4" fill="#38bdf8"/>
    <text x="90" y="106" font-family="'Space Grotesk','Helvetica Neue',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Claude Code</text>
    <text x="66" y="138" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#7b8ea3">~/.claude session logs</text>
  </g>

  <!-- source: Codex -->
  <g>
    <rect x="46" y="200" width="272" height="92" rx="14" fill="#101a26" stroke="#2dd4bf" stroke-opacity="0.22"/>
    <circle cx="74" cy="232" r="4" fill="#2dd4bf"/>
    <text x="90" y="238" font-family="'Space Grotesk','Helvetica Neue',sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Codex</text>
    <text x="66" y="270" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#7b8ea3">~/.codex session files</text>
  </g>

  <!-- converging arrows into Tachi -->
  <path d="M322 114 C 430 114, 470 150, 566 168" fill="none" stroke="#38bdf8" stroke-width="2.4" stroke-opacity="0.85" marker-end="url(#arrowCyan)"/>
  <path d="M322 246 C 430 246, 470 210, 566 192" fill="none" stroke="#2dd4bf" stroke-width="2.4" stroke-opacity="0.85" marker-end="url(#arrowTeal)"/>

  <!-- Tachi (the sink) -->
  <g>
    <rect x="592" y="96" width="286" height="168" rx="18" fill="url(#tachiFill)" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="735" y="150" text-anchor="middle" font-family="'Space Grotesk','Helvetica Neue',sans-serif" font-size="34" font-weight="700" fill="#f1f5f9">Tachi</text>
    <text x="735" y="182" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#9fb3c8">menu bar companion</text>
    <rect x="655" y="206" width="160" height="30" rx="15" fill="#38bdf8" fill-opacity="0.10" stroke="#38bdf8" stroke-opacity="0.28"/>
    <text x="735" y="226" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="12" fill="#7ac6f2" letter-spacing="1">NO SETUP SCREEN</text>
  </g>

  <!-- caption -->
  <text x="460" y="326" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="14" fill="#5a6b7e">reads standard local traces — your coding state stays on your Mac</text>
</svg>
